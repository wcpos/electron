name: Test

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: 🏗 Setup Electron
        uses: ./.github/actions/setup-electron

      - name: 🏗 Add RXDB_LICENSE_KEY to package.json
        env:
          RXDB_LICENSE_KEY: ${{ secrets.RXDB_LICENSE_KEY }}
        run: jq --arg license "$RXDB_LICENSE_KEY" '.accessTokens["rxdb-premium"] = $license' package.json > tmp.json && mv tmp.json package.json

      - name: 📦 Install dependencies
        run: pnpm install

      - name: 🧪 Test
        run: |
          pnpm lint
          pnpm exec tsc
          pnpm test
