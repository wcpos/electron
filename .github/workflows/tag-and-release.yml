name: Publish

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      platform:
        description: 'Select the platform to build and publish'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - macos
          - macos-arm64
          - windows
          - linux

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.platform || 'push' }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-expo:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' || github.event.inputs.platform == 'macos-arm64' || github.event.inputs.platform == 'windows' || github.event.inputs.platform == 'linux' }}

    steps:
      - name: 📥 Check out the Monorepo repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: wcpos/monorepo

      - name: 🏗 Setup Monorepo
        uses: wcpos/monorepo/.github/actions/setup-monorepo@main
        with:
          rxdb-license-key: ${{ secrets.RXDB_LICENSE_KEY }}
          uniwind-auth-token: ${{ secrets.UNIWIND_AUTH_TOKEN }}

      - name: 🔨 Build Expo for Electron
        run: pnpm --filter @wcpos/main build:electron

      - name: 📦 Archive production artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: expo-dist
          path: apps/main/electron-build

  publish-macos:
    needs: build-expo
    runs-on: macos-15-intel
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos' }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Download expo-dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: expo-dist
          path: dist

      - name: 🏗 Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: Install Python setuptools
        run: python3 -m pip install --break-system-packages setuptools

      - name: 🔐 Signing By Apple Developer ID
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: 📦 Install and rebuild native modules
        env:
          RXDB_PREMIUM: ${{ secrets.RXDB_LICENSE_KEY }}
        run: |
          node -e "if (!process.env.RXDB_PREMIUM) { console.error('::error::RXDB_LICENSE_KEY secret is missing or not available to this workflow'); process.exit(1); }"
          npm install
          npm run rebuild:all

      - name: 🚀 Publish MacOS x64 release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-app

  publish-macos-arm64:
    needs:
      - build-expo
      # - publish-macos
    runs-on: macos-latest
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'macos-arm64' }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Download expo-dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: expo-dist
          path: dist

      - name: 🏗 Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: 🔐 Signing By Apple Developer ID
        uses: apple-actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MAC_CERTS }}
          p12-password: ${{ secrets.MAC_CERTS_PASSWORD }}

      - name: 📦 Install and rebuild native modules
        env:
          RXDB_PREMIUM: ${{ secrets.RXDB_LICENSE_KEY }}
        run: |
          node -e "if (!process.env.RXDB_PREMIUM) { console.error('::error::RXDB_LICENSE_KEY secret is missing or not available to this workflow'); process.exit(1); }"
          npm install
          npm run rebuild:all

      - name: 🚀 Publish MacOS arm64 release
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARCH: arm64
        run: npm run publish-app -- --arch=arm64 --platform=darwin

  publish-windows:
    needs: build-expo
    # Pin to windows-2022 (VS 2022 / v17). The windows-latest image rolled to
    # Visual Studio 18, which the bundled @electron/node-gyp cannot classify
    # (invalid versionYear), breaking native module rebuilds (@serialport/bindings-cpp).
    runs-on: windows-2022
    if: ${{ github.event.inputs.platform == 'all' || github.event.inputs.platform == 'windows' }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Download expo-dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: expo-dist
          path: dist

      - name: 🏗 Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      - name: 📦 Install and rebuild native modules
        env:
          RXDB_PREMIUM: ${{ secrets.RXDB_LICENSE_KEY }}
        run: |
          node -e "if (!process.env.RXDB_PREMIUM) { console.error('::error::RXDB_LICENSE_KEY secret is missing or not available to this workflow'); process.exit(1); }"
          npm install
          npm run rebuild:all

      - name: 🚀 Publish Windows release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-app


  validate-flathub-extra-data:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 🐧 Validate Flathub extra-data placeholders
        run: |
          set -euo pipefail
          manifest=flathub/com.wcpos.main.yml

          echo "Checking $manifest for unresolved Flathub placeholders..."
          if grep -En 'sha256:[[:space:]]*0{64}|size:[[:space:]]*0([[:space:]#]|$)|TODO' "$manifest"; then
            echo "::warning file=$manifest::Flathub submission manifest still has placeholders. This does not block Electron app publishing; finalize it after the Linux .deb has been published."
          else
            echo "Flathub extra-data placeholders resolved."
          fi

  publish-linux:
    needs:
      - build-expo
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'push' || github.event.inputs.platform == 'all' || github.event.inputs.platform == 'linux' }}

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: 📦 Download expo-dist artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: expo-dist
          path: dist

      - name: 🏗 Install Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22

      # Build tooling for the blocking makers only (.deb -> dpkg/fakeroot,
      # .rpm -> rpm) plus libudev for the `usb` native module. Flatpak tooling
      # is installed in the non-blocking Flatpak section below so an apt
      # failure on those packages can't block the .deb/.rpm publish.
      - name: 🐧 Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            libudev-dev \
            dpkg fakeroot \
            rpm

      - name: 📦 Install and rebuild native modules
        env:
          RXDB_PREMIUM: ${{ secrets.RXDB_LICENSE_KEY }}
          CXXFLAGS: -std=c++17
          npm_config_cxxflags: -std=c++17
        run: |
          node -e "if (!process.env.RXDB_PREMIUM) { console.error('::error::RXDB_LICENSE_KEY secret is missing or not available to this workflow'); process.exit(1); }"
          npm install
          npm run rebuild:all

      # Flatpak is excluded from this step (forge.config.ts only enables the
      # Flatpak maker when WCPOS_FLATPAK=1) so a flatpak-builder failure can
      # never block the .deb/.rpm assets again. Flatpak is attempted below as
      # a non-blocking step.
      - name: 🚀 Publish Linux release (.deb / .rpm)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run publish-app

      # --- Non-blocking Flatpak attempt below: every step is continue-on-error ---

      # Flatpak build tooling (flatpak-builder, eu-strip from elfutils), then the
      # Freedesktop runtime + Electron BaseApp pulled from Flathub. Pre-install the
      # runtimes so the build is deterministic.
      - name: 🐧 Install Flatpak tooling + runtime + Electron BaseApp (non-blocking)
        id: flatpak-runtime
        continue-on-error: true
        run: |
          sudo apt-get install -y flatpak flatpak-builder elfutils
          flatpak remote-add --if-not-exists --user flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          flatpak install -y --user flathub \
            org.freedesktop.Platform//25.08 \
            org.freedesktop.Sdk//25.08 \
            org.electronjs.Electron2.BaseApp//25.08

      - name: 📦 Make Flatpak bundle (non-blocking)
        id: make-flatpak
        if: steps.flatpak-runtime.outcome == 'success'
        continue-on-error: true
        env:
          WCPOS_FLATPAK: '1'
          # Surface flatpak-builder output — Forge swallows it otherwise, which is
          # why past failures only showed "flatpak-builder failed with status code 1".
          DEBUG: 'electron-installer-flatpak*'
        run: npx electron-forge make --targets=@electron-forge/maker-flatpak --skip-package

      - name: ⬆️ Upload Flatpak to release (non-blocking)
        if: steps.make-flatpak.outcome == 'success'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          files=$(find out/make -name '*.flatpak' -type f)
          if [ -z "$files" ]; then
            echo "::warning title=Flatpak missing::Flatpak make reported success but no .flatpak file was found under out/make."
            exit 0
          fi
          echo "$files" | while read -r f; do
            echo "Uploading $f to release v$version"
            gh release upload "v$version" "$f" --clobber
          done

      - name: 📋 Report Flatpak result
        if: steps.flatpak-runtime.outcome != 'success' || steps.make-flatpak.outcome != 'success'
        run: |
          echo "::warning title=Flatpak deferred::The non-blocking Flatpak build did not complete (runtime install: ${{ steps.flatpak-runtime.outcome }}, make: ${{ steps.make-flatpak.outcome }}). .deb/.rpm assets are unaffected. See the 'Make Flatpak bundle' step log (DEBUG output enabled) for the flatpak-builder error."
          {
            echo "## :warning: Flatpak deferred"
            echo "The non-blocking Flatpak build did not complete (runtime install: \`${{ steps.flatpak-runtime.outcome }}\`, make: \`${{ steps.make-flatpak.outcome }}\`)."
            echo ".deb/.rpm assets are unaffected."
          } >> "$GITHUB_STEP_SUMMARY"

  # Fill the (draft) release body once any platform has published assets.
  # The desktop release notes mirror the WCPOS app release of the same version
  # (created earlier in the release train on wcpos/monorepo), plus a desktop
  # footer. A non-empty body is never overwritten, so hand-curated notes and
  # re-runs of failed platform jobs are safe.
  release-notes:
    needs:
      - publish-macos
      - publish-macos-arm64
      - publish-windows
      - publish-linux
    if: >-
      ${{ !cancelled() && (
        needs.publish-macos.result == 'success' ||
        needs.publish-macos-arm64.result == 'success' ||
        needs.publish-windows.result == 'success' ||
        needs.publish-linux.result == 'success'
      ) }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: 📝 Mirror app release notes onto the desktop release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          version=$(node -p "require('./package.json').version")
          tag="v$version"

          body=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
          if [ -n "$body" ]; then
            echo "Release $tag already has notes; leaving them untouched."
            exit 0
          fi

          # Fetch the app release body. Fall back to footer-only ONLY on a
          # clean 404 (release genuinely missing); fail the job on auth,
          # rate-limit, or other API errors so we never publish incomplete
          # notes silently.
          notes_file=$(mktemp)
          set +e
          resp=$(gh api "repos/wcpos/monorepo/releases/tags/$tag" 2>&1)
          rc=$?
          set -e
          if [ "$rc" -eq 0 ]; then
            printf '%s' "$resp" | jq -r '.body // ""' > "$notes_file"
            if [ -s "$notes_file" ]; then
              echo "" >> "$notes_file"
            else
              echo "::warning title=App notes empty::wcpos/monorepo release $tag exists but has an empty body; using the desktop footer only."
            fi
          elif printf '%s' "$resp" | grep -q "HTTP 404"; then
            echo "::warning title=App notes missing::No wcpos/monorepo release $tag; using the desktop footer only."
            : > "$notes_file"
          else
            echo "::error title=App notes lookup failed::gh api exited $rc: $resp"
            exit 1
          fi
          echo "Desktop build of WCPOS app **$version**. Available for macOS (Intel + Apple Silicon), Windows, and Linux (\`.deb\` / \`.rpm\`)." >> "$notes_file"

          # Re-check right before writing: GitHub has no conditional release
          # update, so this narrows the window in which a concurrent manual
          # edit (or a second publish run) could be clobbered.
          body=$(gh release view "$tag" --repo "$GITHUB_REPOSITORY" --json body --jq .body)
          if [ -n "$body" ]; then
            echo "Release $tag gained notes while this job was running; leaving them untouched."
            exit 0
          fi
          gh release edit "$tag" --repo "$GITHUB_REPOSITORY" --notes-file "$notes_file"
          echo "Release notes set on $tag from wcpos/monorepo $tag."
